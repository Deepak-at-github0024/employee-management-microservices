server.port=9090

spring.application.name=employee-api-gateway

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://EMPLOYEE-AUTH-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**

spring.cloud.gateway.routes[1].id=create-service
spring.cloud.gateway.routes[1].uri=lb://EMPLOYEE-CREATE-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/employee/**

spring.cloud.gateway.routes[2].id=update-service
spring.cloud.gateway.routes[2].uri=lb://EMPLOYEE-UPDATE-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/update/**